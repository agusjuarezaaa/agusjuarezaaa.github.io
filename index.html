<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300&display=swap" rel="stylesheet">
    <style>
        body { background: transparent !important; margin: 0; padding: 0; overflow: hidden; }
        .panel { position: absolute; left: 40px; top: 50px; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .titulo { font-family: 'Lato', sans-serif !important; font-size: 10px !important; letter-spacing: 0.3em !important; text-transform: uppercase; color: rgba(255,255,255,0.6); }
        #meter { font-family: 'Lato', sans-serif !important; font-size: 28px !important; font-weight: 300 !important; color: #ffffff !important; line-height: 1; }
        .linea { position: absolute; left: 45px; top: 100px; bottom: 50px; width: 1px; background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div class="panel">
        <div class="titulo">Profundidad</div>
        <div id="meter">000m</div>
    </div>
    <div class="linea"></div>

    <script>
        window.addEventListener('message', (event) => {
            if (event.data.type === 'scroll') {
                const depth = Math.floor(event.data.percent * 1000);
                document.getElementById('meter').innerText = depth.toString().padStart(3, '0') + 'm';
            }
        });
    </script>
</body>
</html>
