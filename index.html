<div id="contador-wrapper" style="position: fixed; top: 50px; left: 40px; z-index: 999999; pointer-events: none; font-family: sans-serif; color: #ffffff;">
    <div style="font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 5px;">Profundidad</div>
    <div id="valor-metros" style="font-size: 32px; font-weight: 300; line-height: 1;">000m</div>
</div>

<script>
    window.addEventListener('scroll', () => {
        const scrollTotal = document.documentElement.scrollHeight - window.innerHeight;
        const percent = scrollTotal > 0 ? (window.scrollY / scrollTotal) : 0;
        
        // Cambia el 500 por la profundidad máxima que quieras
        const maxDepth = 500; 
        const depth = Math.floor(percent * maxDepth);
        
        const display = document.getElementById('valor-metros');
        if (display) {
            display.innerText = depth.toString().padStart(3, '0') + 'm';
        }
    });
</script>
