<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300&display=swap" rel="stylesheet">
    <style>
        .meter-wrapper { 
            position: fixed; top: 50px; left: 40px; 
            font-family: 'Lato', sans-serif !important; 
            pointer-events: none;
        }
        .meter-wrapper .titulo { 
            font-size: 10px !important; letter-spacing: 0.3em !important; 
            text-transform: uppercase; color: rgba(255,255,255,0.6); 
            margin-bottom: 8px;
        }
        .meter-wrapper #meter { 
            font-size: 28px !important; font-weight: 300 !important; 
            color: #ffffff !important; line-height: 1;
        }
    </style>
</head>
<body style="margin:0; background:transparent !important;">

    <div class="meter-wrapper">
        <div class="titulo">Profundidad</div>
        <div id="meter">000m</div>
    </div>

    <script>
        window.addEventListener('message', (event) => {
            if (event.data.type === 'scroll') {
                const depth = Math.floor(event.data.percent * 1000);
                document.getElementById('meter').innerText = depth.toString().padStart(3, '0') + 'm';
            }
        });
    </script>
</body>
</html>
