<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; padding: 0; background: transparent !important; overflow: hidden; }
        .c { position: fixed; top: 50px; left: 40px; pointer-events: none; color: #ffffff; font-family: sans-serif; }
        /* Ajuste visual igual a image_17531d.png */
        .t { font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: #ffffff; margin-bottom: 2px; }
        .n { font-size: 48px; font-weight: 300; line-height: 1; }
        .m { font-size: 24px; }
    </style>
</head>
<body>
    <div class="c">
        <div class="t">Profundidad</div>
        <div id="v" class="n">000<span class="m">m</span></div>
    </div>
    <script>
        // Esta es la única forma de detectar el scroll desde un iframe externo
        window.addEventListener('scroll', function() {
            const h = document.documentElement.scrollHeight - window.innerHeight;
            const p = window.scrollY / h;
            // Cambia el 500 por el número máximo de metros que quieras
            const d = Math.floor(p * 500); 
            document.getElementById('v').innerHTML = d.toString().padStart(3, '0') + '<span class="m">m</span>';
        }, true);
    </script>
</body>
</html>
