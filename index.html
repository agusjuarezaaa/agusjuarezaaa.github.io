<!DOCTYPE html>
<html>
<head>
    <style>
        /* Aislamos todo para que no afecte a la web principal */
        body { margin: 0; padding: 0; background: transparent !important; overflow: hidden; font-family: sans-serif; }
        .contador { color: #ffffff; position: fixed; top: 50px; left: 40px; pointer-events: none; }
        .titulo { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 5px; }
        .numero { font-size: 32px; font-weight: 300; line-height: 1; }
    </style>
</head>
<body>
    <div class="contador">
        <div class="titulo">Profundidad</div>
        <div id="valor" class="numero">000m</div>
    </div>
    <script>
        // Este script vive dentro del iframe y escucha el scroll de la ventana principal
        window.addEventListener('scroll', () => {
            const scrollTotal = document.documentElement.scrollHeight - window.innerHeight;
            const percent = window.scrollY / scrollTotal;
            const depth = Math.floor(percent * 500); // Límite de 500m
            document.getElementById('valor').innerText = depth.toString().padStart(3, '0') + 'm';
        }, true);
    </script>
</body>
</html>
